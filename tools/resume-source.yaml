# Role-targeted summaries. CONTENT, not engine logic — the engine reads source['summaries']
# and is identity-agnostic. Copied verbatim from the previously hardcoded generate_summary().
summaries:
  fde: >
    Built the governance infrastructure that makes agentic systems enterprise-safe,
    not as a prototype, but in production: exit-code-2 enforcement that blocks tool execution
    before damage occurs, a 5-question admission gate with 80 logged gate decisions, and a
    field-to-doctrine feedback loop that converts every production incident into an enforced
    rule loaded at session start. Three upstream contributions to anthropics/claude-code
    (#44707, #57946, #44711) establish credibility at the
    tooling layer the FDE practice depends on. Founder of AWACS LLC; methodology codified into
    five public frameworks and a portable engagement model designed to survive handoff and
    replicate at scale.

  tech_lead_manager: >
    I run a personal agentic operating system, and I teach people how to do it. I have
    delivered live technical training and AI enablement to 200+ people (SVP through engineers)
    and public talks to 250+ live audiences, with a published set of five frameworks and
    working models, not slideware. I use Claude Code as core infrastructure: I pointed my
    system at its release notes, it surfaced three real bugs, I validated them, and it filed
    them upstream (#44707, #57946, #44711). I set up four specialist agents that designed and
    deployed a secure, zero-trust Azure environment in a completely autonomous 31-hour run, and
    I caught it when the AI documented the plan instead of the real change. I do not hand-type the code. I direct the agents, decide
    the architecture, and catch where they are wrong. Twenty-five years in infrastructure is
    how I know when AI output will not survive production.

  agentic_lead: >
    Designed and operated production multi-agent systems from first principles: Analyzer +
    Librarian pipeline with structured handoff, Class A/B/C trust tiers, 5-question admission
    gate, 80 logged decisions, and SHA-256 tamper detection. Three upstream contributions to
    anthropics/claude-code that hardened the hook architecture most agentic deployments depend
    on, including the discovery that sys.exit(1) in PreToolUse is silently non-blocking.
    Founder of AWACS LLC; governance layer blocks destructive operations by code, not by prompt.

  applied_ai_engineer: >
    I run a personal agentic operating system and direct it to build and ship production
    work, then I prove it did what it said. I have shipped a production LLM system that
    answers analyst questions over a company's own structured operational data, and I
    architect the backend it runs on. My product sense is earned, not theoretical:
    eight-plus years at a managed service provider designing productized offerings customers
    paid for and ran their business on. I have directed completely autonomous multi-agent
    builds, from a deployed zero-trust Azure environment to a rapid 7-stage supply-chain
    risk POC, and I catch the AI when it is wrong. I do not hand-type the code; I decide
    the architecture, run the agents, and own the result. The same system studied Claude
    Code's release notes and surfaced three real bugs I validated and filed upstream
    (#44707, #57946, #44711). Twenty-five years in infrastructure is how I know when AI
    output will not survive production.

  trust_and_safety: >
    Built enforcement that actually blocks: PreToolUse hook enforcement via exit(2), 256
    adversarial assertions, three rounds of intentional violation testing, zero failures. The
    critical discovery, sys.exit(1) is silently non-blocking in PreToolUse, filed upstream
    as #44707 and #57946 (area:hooks area:security). Three contributions to the claude-code
    hook system harden the enforcement architecture AI governance depends on. Founder of AWACS
    LLC; the governance layer blocks destructive operations by code, not by policy.

  govcon: >
    Production AI systems in regulated environments where vendor docs are insufficient:
    AI-powered proposal writer with zero-fabrication architecture (Federal Proposal Consultancy,
    GOVCON), AI observability across 5 global sites under enterprise authentication constraints,
    and a zero-trust Azure data consolidation lab with CIS Azure Benchmark v5.0 alignment
    (six named threat actors, Bicep IaC, cert-based SP auth). Three upstream contributions to
    anthropics/claude-code harden the hook enforcement architecture. Founder of AWACS LLC;
    25 years of infrastructure in critical and regulated environments.

  research_engineer: >
    Filed three upstream contributions to anthropics/claude-code by running adversarial
    experiments, not by reading docs. Found that sys.exit(1) in PreToolUse is silently
    non-blocking; filed as #44707 with a one-line fix. Built a 5-question admission gate
    that runs 80 accept/reject decisions against the same evaluation criteria every time,
    no drift, no exception paths. Founder of AWACS LLC; hypothesis-first methodology:
    build the test before the feature, let the failure define the doctrine.

featured_engagements:
  - id: doctrine_enforcement
    title: "DOCTRINE ENFORCEMENT: AGENTIC GOVERNANCE SCAFFOLD FROM ZERO"
    tags: [ai-governance, agentic, quality-gates, playbook, fde, enforcement, enterprise, llm-ops]
    prose: >
      Designed and validated a production agentic governance system using three rounds of intentional
      violation testing across a PreToolUse/PostToolUse enforcement scaffold, 256 final assertions,
      zero failures. Critical field discovery: sys.exit(1) in PreToolUse is silently non-blocking;
      only exit code 2 blocks the operation, absent from all vendor documentation, produced false
      confidence in enforcement architecture across the industry. Filed upstream as GitHub #44707 and
      #57946 (labeled area:hooks area:security). The enforcement scaffold IS the playbook: a reusable,
      three-round adversarial testing pattern any FDE team can run to validate a new agentic deployment
      before it touches production data. The canonical rule, "PostToolUse detects, PreToolUse prevents",
      is now enforced by code, not by policy. Limitation documented and owned: single-company internal
      deployment; multi-client portability is the design goal, not yet the track record.

  - id: zero_trust_azure_lab
    title: "DIRECTED A 31-HOUR AUTONOMOUS MULTI-AGENT BUILD (DEPLOYED, WITH RECEIPTS)"
    tags: [azure, infrastructure, multi-agent, agentic, autonomous, security, iac, bicep, rbac, zero-trust, enterprise, rapid-prototyping, production, leadership, governance, claude]
    prose: >
      I configured four specialist agents (Architect, Security Engineer, Operator, Documentarian)
      and ran a 31-hour autonomous Claude Code session that designed and deployed a secure Azure
      backup system for shared lab workstations. I authorized each stage gate: threat model with six
      named actors, 8-component Bicep IaC, CIS Azure Foundations Benchmark v5.0 controls (3.1, 3.7,
      3.13, 3.14, 5.1, 7.1), immutable blob, cert-based service principal auth, daily SAS rotation.
      The receipts are the point. When a SAS token expired and pushes silently returned HTTP 403 for
      six days, and when an audit caught the AI writing down the plan instead of the pivot it actually
      deployed, I caught both and fixed the record. I do not hand-type the code. I direct the agents,
      decide the architecture, and catch where they are wrong. Deployed and running.
      Repo: github.com/Dwink213/awacs-secure-data-consolidation-lab-workstations

  - id: awacs_lab_pipeline
    title: "AWACS LAB: MULTI-AGENT KNOWLEDGE PIPELINE WITH LIVE QUALITY GATE"
    tags: [multi-agent, agentic, orchestration, llm-ops, sandbox, quality-gates, observability, rapid-prototyping]
    prose: >
      Multi-agent production pipeline: Analyzer and Librarian agents operating in structured handoff,
      5-question admission gate firing on every knowledge candidate before Class A admission,
      80 gate decisions on record (admit and reject, both logged), Class A/B/C trust tiers, SHA-256
      tamper detection on brake events. The engagement model in operational form: every claim earns
      admission through a structured gate; no path bypasses the quality check because there is no path
      around it. Live status dashboard (awacs.ai/status) shows pipeline state in real time.
      Canvas-style sandbox: model output evaluated, versioned, and governed before it enters the
      production knowledge base.

  - id: supply_chain_sentinel
    title: "DIRECTED A PRODUCTION SUPPLY-CHAIN RISK ANALYZER (ABOUT 11K LINES OF PYTHON)"
    tags: [rapid-prototyping, llm, pipeline, python, production, agentic]
    prose: >
      I directed the build of a supply-chain risk analyzer: about 11,000 lines of Python (Flask, the
      Claude API) that takes a company's structured data and answers risk and disruption questions
      about its suppliers, with an interactive dashboard. A multi-stage analysis pipeline where each
      stage feeds the next. I decided the architecture and own the deployed result; the agent did the
      typing. Repo: github.com/Dwink213/AI-supplychainmonitor-v2

