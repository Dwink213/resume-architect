testimony: >
  Federal proposals are high-stakes documents where fabricated claims have legal consequences.
  The standard LLM pitfall, plausible-sounding content that isn't grounded in anything real,
  is disqualifying in this domain. I built the system around a zero-fabrication architecture:
  every sentence in a generated proposal traces to a source document, a client input, or a
  verified fact. The AI is a structuring and drafting layer, not a knowledge source. The
  Shipley method provides the evaluation framework; the BID/NO-BID module uses it to score
  opportunities before they enter the drafting pipeline. SAM.GOV integration pulls live
  opportunity data so the system works with current solicitations. Human-in-the-loop
  validation checkpoints prevent any AI output from advancing without review. Two hundred
  dev hours. Production deployed.
