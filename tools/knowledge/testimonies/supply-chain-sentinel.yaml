testimony: >
  Real deadline. Seven stages. One week. I directed the build of a POC over structured
  data that turns supply-chain signals into supplier risk and disruption answers, zero to
  working demo in one week. I designed the pipeline upfront: seven sequential analysis
  stages for supply chain risk, each stage producing structured output that the next stage
  consumes. No ad-hoc prompt chains, no duct tape between stages. The output of stage 3
  has a schema that stage 4 depends on. When you design the data contracts first, the
  velocity follows from discipline rather than from cutting corners. Eleven thousand lines
  of Python in a week. The point is not the line count, the point is that velocity and
  structure are not in conflict when the architecture is settled before the first line is
  written. This is the develop-POCs and rapidly-prototype workstream, not a side project.
