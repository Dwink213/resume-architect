testimony: >
  At National Cloud Provider I was responsible for the data protection architecture of roughly 50 customer
  environments simultaneously, dedicated, hybrid, private cloud, and public cloud, across
  every major backup platform of that era. Being the technical lead across that many different
  environments taught me something that vendor documentation systematically understates:
  heterogeneity is expensive. Every customer has a slightly different configuration, a slightly
  different SLA, and slightly different tolerance for complexity. The engagement model that
  works at this scale has to be portable. I also designed the multi-tenant managed backup
  product and built the Level I/II/III promotional path so delivery didn't depend on any
  single person. The 13-datacenter migration was executed without data loss and without a
  single-point-of-failure in the team. Multi-client delivery methodology is something you
  learn by doing it at this volume; I can't get that from a project.
bullet_variants:
  featured: >
    Designed data protection architecture for ~50 customer environments across dedicated,
    hybrid, private, and public cloud at National Cloud Provider; technical lead on largest accounts,
    built multi-tenant managed backup product, established Level I/II/III promotional path.
    Led migration of 13 public cloud datacenters with zero data loss and no single point of
    failure in delivery methodology. Managing 50 different customer configurations, where no two
    were alike, is the background for why portability and governance are first-class concerns in
    my AI deployment work.
