testimony: >
  My first real production environment was a 911 dispatch center. Police, Fire, and EMS
  depended on the systems I maintained. The definition of "production outage" in this context
  was not a degraded user experience, it was an unresponsive emergency call. That context
  never leaves you. I migrated the entire server estate (10 physical machines) to 200+ VMs
  on ESX 3.5, stood up the backup 911 dispatch center with annual failover drills, and built
  the in-car MDC system that unified field communications across all three services. The
  discipline I developed there, test your DR plan, document the recovery procedure, prove
  the failover works before you need it, shows up in how I test governance scaffolds
  adversarially before trusting them with production data.
bullet_variants:
  featured: >
    Critical infrastructure for a county emergency dispatch center (Police, Fire, EMS): migrated
    10 physical servers to 200+ VMs on ESX 3.5; stood up DR 911 center with annual failover;
    built in-car MDC unifying field communications. Production was life-safety; downtime was
    measured in lives. The discipline of operating in an environment where failure has
    irreversible consequences is the background for why adversarial testing and governance
    verification are first-class concerns in every system I build.
  long: "**County 911 infrastructure:** migrated 10 physical to 200+ VMs on ESX 3.5; DR 911 center with annual failover; in-car MDC for Police/Fire/EMS field comms; production was life-safety."
