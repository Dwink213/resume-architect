    observability demo showing LLM triage of 3,000+ backup jobs per week. Second session:
    specialist agent methodology, how to assign roles, structure handoffs, and constrain
    agent scope for production reliability. The goal was to close the gap between "AI is
    powerful" and "here is what to do Monday."
