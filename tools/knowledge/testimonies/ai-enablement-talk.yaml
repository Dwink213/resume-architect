testimony: >
  I was asked to help the organization understand what AI agents could actually do for them, 
  not in theory, but in terms they could act on. The gap between "AI is powerful" and
  "here's how to deploy it in your team" is where most enablement fails. I built two sessions
  designed around demos that executives could watch and engineers could learn from simultaneously.
  The first session focused on AI-powered observability, what it looks like when 3,000+ backup
  jobs per week get analyzed by an LLM instead of being manually reviewed. The second session
  introduced specialist agent methodology: how to structure a multi-agent system where each
  agent has a clear role, a defined input, and a constrained output. Delivered to SVP through
  individual contributors. The test: did people leave knowing what to do next? The answer
  was yes.
