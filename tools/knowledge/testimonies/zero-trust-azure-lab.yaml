testimony: >
  I wanted to know if a four-agent system could build enterprise-grade infrastructure from
  nothing in under 48 hours, and whether the output would be honest about what it hadn't
  yet done. The four agents had distinct roles: Architect designed the system, Security
  Engineer owned the threat model and RBAC, Operator wrote the deployment scripts and
  runbooks, Documentarian captured cross-agent reviews and limitations. The threat model
  named six actors; the CIS controls mapped to specific Bicep resource configurations.
  The most important design decision: the Limitations section is part of the deliverable.
  Not an afterthought, it's documented in the README of every component. If something
  wasn't shipped, the repo says so. That discipline is harder to maintain in a real client
  engagement than it sounds.
bullet_variants:
  featured: >
    I configured four specialist agents and ran a completely autonomous 31-hour Claude Code
    session that designed and deployed a zero-trust on-premise-to-Azure workflow overnight. The
    design plan was built in natural language with Claude on my phone; Claude Code imported my
    methodology, built new agents, and stood it up overnight. I authorized the first two stage
    gates, then set it to autonomous; you can see the commit times in GitHub. It then installed
    itself on the machine it was running on and validated end to end.
  long: "**Zero-trust Azure data lab, 31-hour autonomous agentic build:** 4 specialist agents (Architect, Security, Operator, Documentarian), 6-actor threat model, CIS Azure Benchmark v5.0 alignment (controls 3.1–7.1), Bicep IaC, 4-role RBAC, cert-based SP auth, daily SAS rotation."
  short: "Built a zero-trust Azure lab in 31 hours with 4 specialist AI agents; CIS v5.0 aligned, threat-modeled with 6 named actors, fully documented including limitations."
  ats_dense: "**Zero-trust Azure infrastructure (Bicep IaC, Key Vault, RBAC, Log Analytics, cert-based service principal, CIS Azure Benchmark v5.0):** 4-agent autonomous build, 31 hours; threat model with 6 named actors; immutability + daily SAS rotation deployed."
