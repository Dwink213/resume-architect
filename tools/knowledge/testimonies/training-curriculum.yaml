  I turned my own method into training other people can run. The curriculum at awacs.ai/training
  is three courses on AI-orchestrated infrastructure, built around hands-on labs rather than
  slides: students deploy dev, staging, and prod Azure environments, break things on purpose,
  and fix them with AI assistance. I wrote the course content, the labs, and the free tools that
  ship with it. Course 1 is two days and enrolling; Courses 2 and 3 follow. The hard part of
  enablement is not explaining a concept, it is getting someone to do the thing and recover when
  it breaks. That is what the labs are for.
