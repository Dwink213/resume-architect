testimony: >
  Most AI deployments treat cost as an afterthought — billing shows up at the end of
  the month and someone's surprised. I flipped this. Using Claude Code as the operator,
  I authenticated into Azure and ran cost billing management queries directly: resource
  cost attribution, subscription-level spend analysis, and cost allocation across
  environments. Claude Code handled the Azure CLI authentication flow, queried Azure
  Cost Management APIs, and surfaced cost anomalies and optimization opportunities
  without requiring a human to manually navigate the portal. This is FinOps as an
  agentic workflow: the AI is the cost analyst, not just the infrastructure builder.
  The methodology for cost-aware engineering (tokens, milliseconds, and dollars as
  first-class metrics) documented at awacs.ai/compare-azure extends to cloud spend:
  every resource decision carries an attached cost vector.
