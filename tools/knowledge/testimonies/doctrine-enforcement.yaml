testimony: >
  I built this governance system specifically to be attacked. The premise: if you can't
  intentionally violate your own enforcement layer and prove it holds, you don't actually
  have enforcement, you have the appearance of enforcement. Three rounds of targeted testing
  across PreToolUse/PostToolUse hooks; 256 assertions written against the scaffold before
  declaring it production-ready. The field discovery that came out of this, sys.exit(1) in
  PreToolUse is silently non-blocking, only exit(2) actually stops the operation, was absent
  from all Anthropic documentation and had been producing false confidence in enforcement
  architecture across FDE deployments. Filed upstream as #44707 and #57946. The scaffold is
  the playbook: a three-round adversarial testing pattern any FDE team can drop into a new
  deployment and run before it touches production data. The canonical rule, PostToolUse
  detects, PreToolUse prevents, is now enforced by code, not by policy.
