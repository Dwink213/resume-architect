testimony: >
  WDAC is application allowlisting at the kernel level, it blocks anything not explicitly
  permitted. Most AI deployment guides assume you can run arbitrary Python; under WDAC,
  you can't. The prior session on this cluster ended in an sshd lockout because a governance
  rule was too aggressive. I took that incident and turned it into 8 production rules derived
  from exactly what failed. When those rules were loaded in the next session, they held under
  production load: none fired incorrectly, one fired correctly when it was supposed to.
  The enterprise integration work, GraphQL API introspection against the backup platform,
  SMB admin shares for file access, base64-over-SSH when normal file transfer was blocked
  by WDAC, each required adapting the standard AI workflow to the constraints of a locked-down
  enterprise environment. The lesson: every hard constraint in enterprise AI deployment is an
  opportunity to learn something the vendor docs don't teach.
bullet_variants:
  featured: >
    Deployed AI agent under active WDAC enforcement on a 4-node HCI cluster with Azure Arc
    SSH as the only permitted access path; enterprise system integration required GraphQL API
    introspection, SMB admin shares, and base64-over-SSH file transfer. Eight governance rules
    derived from the prior session's sshd lockout; all 8 held under production load, 
    none fired incorrectly, one fired correctly when it mattered. The constraints of a
    WDAC-enforced environment produced a set of hard-won deployment patterns that no vendor
    documentation describes.
