testimony: >
  The problem wasn't that backup jobs were failing, it's that no one could tell which
  failures mattered. Three thousand jobs per week across five continents; the noise-to-signal
  ratio was high enough that real problems were getting buried in alert fatigue. I built
  an Azure Functions pipeline that ingests Rubrik job events, routes them through Azure
  OpenAI (provisioned and managed via Azure AI Foundry, dedicated instance for data
  compliance) for triage and pattern analysis, and creates ServiceNow incidents for only the
  failures that actually need human attention. Six weeks from concept to production across
  a global enterprise environment. The key engineering decision was treating the LLM not
  as a chatbot but as a classification layer, structured output, defined severity tiers,
  deterministic routing to ServiceNow. That's not a demo. That's production LLM ops.
  Azure AI Foundry was selected over shared OpenAI endpoints specifically for data
  compliance and dedicated throughput in a global enterprise context.
  Framework repo: github.com/Dwink213/api-observability-framework. Case study: awacs.ai/case-studies/api-voyager.html.
