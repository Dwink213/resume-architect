testimony: >
  The question was whether Claude Code could autonomously manage its own deployment
  environment, not just be used as a tool in a pipeline, but be the agent that runs
  the pipeline. I built a three-tier Azure deployment wizard (Dev/Staging/Prod) where
  Claude Code was responsible for drift detection, destroy/redeploy decisions, and
  validation at each tier. Nightly runs, automated. 14 destroy/redeploy cycles during
  24 hours of autonomous testing; zero failures. The design constraint was that drift
  detection had to surface real differences between tiers, not false positives from
  expected configuration variance. The result: an agentic system that manages infrastructure
  state with enough fidelity that you can trust it to run overnight without human oversight.
