# cover-sheet-lint.yaml — UNIVERSAL hard gate for cover sheet quality.
# check-cover-sheet.py reads this and FAILS (exit 2) on any violation.
#
# This file holds ONLY candidate-agnostic checks: no leaked internal labels and no
# raw {{PLACEHOLDER}} that the generator failed to fill. Identity-bound required
# strings (a candidate's songs, articles, issues, manifest, claude link) live in
# profile.yaml -> gate_overrides.cover_required and are merged in at runtime, so no
# one candidate's artifacts are ever forced on another.

# 1) Banned strings — internal commentary that must never reach a hiring manager.
banned:
  - "Suggested opening line"       # template label, not a section in the deliverable
  - "Application constraints"      # internal tracking section
  - "Company: TBD"                 # placeholder not replaced
  - "Company name TBD"             # placeholder not replaced
  - "company is TBD"               # placeholder not replaced
  - "\\bRecruiter:\\s"             # internal label format (Recruiter: Hannah)
  - "INTERNAL ONLY"                # template instruction block leaked
  - "\\{\\{[A-Z_]+\\}\\}"         # unfilled placeholder ({{HUMAN_NOTE}} etc.)
  - "Update this section when"     # internal process note
  - "\\[paste the full"            # copy-paste instruction that leaked

# 2) Required strings — UNIVERSAL only. The "(human written)" honesty label must always
#    be present regardless of candidate. Identity-bound requirements come from the profile.
required:
  - "human written"                # the "A note from ... (human written)" honesty label
